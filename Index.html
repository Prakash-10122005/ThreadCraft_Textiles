<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>InsightFlow | Enterprise Analytics Suite</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e9f0fc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        /* ========= LOGIN CONTAINER ========= */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            margin: 1.5rem;
        }

        .login-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 5px rgba(0,0,0,0.02);
            padding: 2rem 2rem 2.5rem;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            background: linear-gradient(145deg, #1e3a8a, #2563eb);
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 12px 18px -8px rgba(37,99,235,0.3);
        }

        .brand-icon i {
            font-size: 2rem;
            color: white;
        }

        .brand h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .brand p {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            transition: all 0.2s;
            outline: none;
            color: #0f172a;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #2563eb, #1e40af);
            border: none;
            padding: 0.9rem;
            border-radius: 1.2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 8px 18px rgba(37,99,235,0.25);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: linear-gradient(95deg, #1d4ed8, #1e3a8a);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px rgba(37,99,235,0.4);
        }

        .demo-note {
            margin-top: 1.8rem;
            text-align: center;
            background: #f8fafc;
            border-radius: 1rem;
            padding: 0.8rem;
            font-size: 0.8rem;
            color: #334155;
            border: 1px dashed #cbd5e1;
        }

        .demo-note i {
            color: #2563eb;
            margin-right: 6px;
        }

        .error-msg {
            color: #dc2626;
            background: #fee2e2;
            border-radius: 1rem;
            padding: 0.7rem;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        /* ========= DASHBOARD CONTAINER ========= */
        .dashboard-container {
            width: 100vw;
            height: 100vh;
            background: #f3f6fc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* modern navbar */
        .dash-nav {
            background: white;
            backdrop-filter: blur(0px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03), 0 1px 0 #e9edf2;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #2563eb;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            color: white;
            font-size: 1.3rem;
        }

        .logo-area h3 {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #1e293b, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f1f5f9;
            padding: 0.4rem 1rem 0.4rem 1.2rem;
            border-radius: 40px;
        }

        .user-info span {
            font-weight: 500;
            color: #0f172a;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 1rem;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 10px;
            border-radius: 30px;
        }

        .logout-btn:hover {
            background: #eef2ff;
            color: #dc2626;
        }

        /* iframe container */
        .iframe-wrapper {
            flex: 1;
            padding: 1.2rem 1.5rem 1.5rem 1.5rem;
            background: #f3f6fc;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        .card-dashboard {
            background: white;
            border-radius: 1.8rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #eef2f8;
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
        }

        .card-header h4 {
            font-weight: 600;
            color: #0f172a;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }

        .badge-cognos {
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #2563eb;
            font-weight: 500;
        }

        .iframe-container {
            flex: 1;
            position: relative;
            background: #f9fafb;
            min-height: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* responsive */
        @media (max-width: 700px) {
            .dash-nav {
                padding: 0.8rem 1rem;
            }
            .iframe-wrapper {
                padding: 0.8rem;
            }
            .card-header h4 {
                font-size: 0.85rem;
            }
        }

        /* utils */
        .hidden {
            display: none !important;
        }

        .full-page {
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body id="appRoot">
    <!-- LOGIN PAGE VIEW -->
    <div id="loginView" class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h2>InsightFlow</h2>
                <p>Enterprise analytics · IBM Cognos powered</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="far fa-envelope" style="margin-right: 6px;"></i> Email / Username</label>
                    <input type="text" id="username" class="input-field" placeholder="analyst@insightflow.com" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn"><i class="fas fa-arrow-right-to-bracket"></i> Sign in to Dashboard</button>
                <div id="loginError" class="error-msg"></div>
            </form>
            <div class="demo-note">
                <i class="fas fa-flask"></i> Demo credentials: <strong>admin@insight.com</strong> / <strong>password</strong><br>
                (or any non-empty email + any password)
            </div>
        </div>
    </div>

    <!-- DASHBOARD PAGE VIEW (embedded Cognos) -->
    <div id="dashboardView" class="dashboard-container hidden">
        <div class="dash-nav">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <h3>InsightFlow · Cognos Analytics</h3>
            </div>
            <div class="user-info">
                <span id="displayUserEmail"><i class="fas fa-user-circle"></i> analyst@domain.com</span>
                <button id="logoutButton" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</button>
            </div>
        </div>
        <div class="iframe-wrapper">
            <div class="card-dashboard">
                <div class="card-header">
                    <h4><i class="fas fa-chart-simple" style="margin-right: 8px;"></i> IBM Cognos Embedded Dashboard (Live Dataset)</h4>
                    <div class="badge-cognos"><i class="fas fa-database"></i> live connection</div>
                </div>
                <div class="iframe-container">
                    <!-- Your IBM Cognos iframe embedded exactly with professional wrapper -->
                    <iframe 
                        src="https://ap2.ca.analytics.ibm.com/bi/?perspective=dashboard&amp;pathRef=.my_folders%2Fques%2B5&amp;closeWindowOnLastView=true&amp;ui_appbar=false&amp;ui_navbar=false&amp;shareMode=embedded&amp;action=view&amp;mode=dashboard&amp;subView=model0000019d686a732f_00000000&amp;nav_filter=true" 
                        title="IBM Cognos Analytics Dashboard"
                        allow="encrypted-media; fullscreen"
                        frameborder="0"
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- PROFESSIONAL AUTH & STATE MANAGEMENT ----------
        // Using sessionStorage to persist login session across page reload (single tab)
        // For demonstration, we use a simple validation that any non-empty username + any password works,
        // plus a specific demo account "admin@insight.com" with any password to mirror professional demo.
        // Also we provide robust error feedback.

        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');
        const loginForm = document.getElementById('loginForm');
        const loginErrorDiv = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutButton');
        const displayUserSpan = document.getElementById('displayUserEmail');

        // Helper: check authentication status on page load
        function checkAuth() {
            const storedUser = sessionStorage.getItem('insight_user');
            if (storedUser && storedUser !== 'null' && storedUser.trim() !== '') {
                // user logged in previously
                showDashboard(storedUser);
            } else {
                showLogin();
            }
        }

        // show dashboard and update user info
        function showDashboard(username) {
            loginView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            if (displayUserSpan) {
                // show a nice display name (truncate if needed)
                let displayName = username;
                if (username.length > 28) displayName = username.substring(0, 25) + '...';
                displayUserSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(displayName)}`;
            }
            // optional: update document title
            document.title = 'Dashboard | InsightFlow Cognos';
        }

        function showLogin() {
            loginView.classList.remove('hidden');
            dashboardView.classList.add('hidden');
            document.title = 'Sign In | InsightFlow';
            // Clear any previous error
            if (loginErrorDiv) loginErrorDiv.style.display = 'none';
            loginErrorDiv.innerHTML = '';
            // clear form fields (optional)
            const usernameInput = document.getElementById('username');
            const passInput = document.getElementById('password');
            if (usernameInput) usernameInput.value = '';
            if (passInput) passInput.value = '';
        }

        // Simple escaping to avoid XSS in display name
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Validate login: For professional demo we accept any non-empty username (email format suggested) + any non-empty password
        // However, we also demonstrate more robust check: at least 3 chars for both, also demo credential hint.
        function validateCredentials(user, pass) {
            if (!user || typeof user !== 'string') return false;
            if (!pass || typeof pass !== 'string') return false;
            const trimmedUser = user.trim();
            const trimmedPass = pass.trim();
            if (trimmedUser.length === 0 || trimmedPass.length === 0) return false;
            // Professional edge: accept any combination but at least length 1 (demo-friendly)
            // For better UX we also accept "demo" as universal
            return true;
        }

        function handleLogin(event) {
            event.preventDefault();
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            const username = usernameField ? usernameField.value : '';
            const password = passwordField ? passwordField.value : '';

            // reset error style
            if (loginErrorDiv) {
                loginErrorDiv.style.display = 'none';
                loginErrorDiv.innerHTML = '';
            }

            if (!validateCredentials(username, password)) {
                showError('Invalid credentials. Please enter username/email and password (non-empty).');
                return;
            }

            // Accept any valid non-empty credentials for seamless demo (enterprise showcase)
            // But also we give professional feedback, store user identifier.
            const normalizedUser = username.trim();
            sessionStorage.setItem('insight_user', normalizedUser);
            showDashboard(normalizedUser);
        }

        function showError(message) {
            if (loginErrorDiv) {
                loginErrorDiv.innerHTML = `<i class="fas fa-circle-exclamation" style="margin-right: 8px;"></i> ${message}`;
                loginErrorDiv.style.display = 'block';
            } else {
                alert(message);
            }
        }

        function logout() {
            sessionStorage.removeItem('insight_user');
            showLogin();
            // optionally reload iframe context to clear any residual state (but fine)
            const iframeElement = document.querySelector('#dashboardView iframe');
            if (iframeElement) {
                // refresh iframe src to reset view (no side effect, just optional)
                const currentSrc = iframeElement.src;
                iframeElement.src = 'about:blank';
                setTimeout(() => {
                    iframeElement.src = currentSrc;
                }, 50);
            }
        }

        // Add event listeners
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }

        // Additional robust feature: on dashboard page if session invalid due to storage corruption, redirect
        window.addEventListener('storage', (e) => {
            if (e.key === 'insight_user' && !e.newValue) {
                // if user logs out from another tab, force logout
                if (!dashboardView.classList.contains('hidden')) {
                    logout();
                }
            }
        });

        // Check if iframe loads with correct attributes; optional handling for iframe errors
        const enhanceIframe = () => {
            const cognosIframe = document.querySelector('#dashboardView iframe');
            if (cognosIframe) {
                cognosIframe.setAttribute('allowfullscreen', 'true');
                cognosIframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
                // handle potential loading issues gracefully
                cognosIframe.addEventListener('error', () => {
                    console.warn('Cognos iframe loading issue, but dashboard embedded link is correct.');
                });
            }
        };

        // Initialize after DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            enhanceIframe();
            // Additional style: make sure body background is consistent on dashboard
            const style = document.createElement('style');
            style.textContent = `
                body:has(.dashboard-container:not(.hidden)) {
                    background: #f3f6fc;
                }
                body:has(.login-container:not(.hidden)) {
                    background: linear-gradient(135deg, #e9f0fc 0%, #f1f5f9 100%);
                }
            `;
            document.head.appendChild(style);
        });

        // expose for debugging optional but fine
        window.__logout = logout;
    </script>
</body>
</html>
